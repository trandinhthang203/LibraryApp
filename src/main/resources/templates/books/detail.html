<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Chi tiết sách</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></head>
<body class="container mt-4">
<h2 th:text="${book.title}">Tiêu đề</h2>
<p><b>Tác giả:</b> <span th:text="${book.author}"></span></p>
<p><b>Nhà xuất bản:</b> <span th:text="${book.publisher}"></span></p>
<p><b>ISBN:</b> <span th:text="${book.isbn}"></span></p>
<p><b>Tồn kho:</b> <span th:text="${book.stockQuantity}"></span></p>
<p><b>Tóm tắt:</b> <span th:text="${book.summary}"></span></p>
<a class="btn btn-secondary" th:href="@{/books}">Quay lại</a>
</body>
</html>
