<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 400px;">
    <div class="card shadow-sm p-4">
        <h3 class="text-center mb-3">📚 Đăng nhập LMS</h3>

        <!-- Thông báo lỗi khi sai username/password -->
        <div class="alert alert-danger" th:if="${param.error}">
            Sai tên đăng nhập hoặc mật khẩu!
        </div>
        <!-- Thông báo khi logout thành công -->
        <div class="alert alert-success" th:if="${param.logout}">
            Bạn đã đăng xuất thành công.
        </div>
        <!-- Thông báo khi vừa đăng ký xong -->
        <div class="alert alert-success" th:if="${param.registered}">
            Đăng ký thành công, vui lòng đăng nhập.
        </div>

        <!-- action mặc định Spring Security xử lý là /login (POST) -->
        <form method="post" th:action="@{/login}">
            <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
        </form>

        <p class="text-center mt-3">
            Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a>
        </p>
    </div>
</div>
</body>
</html>
