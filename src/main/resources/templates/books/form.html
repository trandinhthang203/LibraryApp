<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${bookId != null ? 'Sửa sách' : 'Thêm sách'}"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4" style="max-width: 600px;">


<h2 th:text="${bookId != null ? 'Sửa sách' : 'Thêm sách mới'}"></h2>


<div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

<form method="post"
      th:action="${bookId != null} ? @{/books/{id}/edit(id=${bookId})} : @{/books/new}"
      th:object="${book}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />


    <div class="mb-3">
        <label class="form-label">ISBN</label>
        <input type="text" th:field="*{isbn}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Tiêu đề</label>
        <input type="text" th:field="*{title}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Tác giả</label>
        <input type="text" th:field="*{author}" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label">Nhà xuất bản</label>
        <input type="text" th:field="*{publisher}" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label">Ngày xuất bản</label>
        <input type="date" th:field="*{publicationDate}" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label">Tóm tắt</label>
        <textarea th:field="*{summary}" class="form-control" rows="3"></textarea>
    </div>
    <div class="mb-3">
        <label class="form-label">Số lượng tồn kho</label>
        <input type="number" th:field="*{stockQuantity}" class="form-control" min="0" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Danh mục</label>
        <div>
            <div th:if="${#lists.isEmpty(categories)}">Chưa có danh mục nào. Vui lòng tạo danh mục trước.</div>
            <div th:each="cat : ${categories}" class="form-check">
                <input class="form-check-input" type="checkbox"
                       th:id="${'cat-' + cat.id}"
                       th:value="${cat.id}"
                       th:field="*{categoryIds}" />
                <label class="form-check-label" th:for="${'cat-' + cat.id}" th:text="${cat.name}"></label>
            </div>
        </div>
    </div>

    <button type="submit" class="btn btn-success">Lưu</button>
    <a class="btn btn-secondary" th:href="@{/books}">Hủy</a>
</form>
</body>
</html>
