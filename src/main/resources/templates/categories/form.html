<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${categoryId != null ? 'Sửa danh mục' : 'Thêm danh mục'}"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4" style="max-width: 500px;">

<h2 th:text="${categoryId != null ? 'Sửa danh mục' : 'Thêm danh mục'}"></h2>

<div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

<form method="post"
      th:action="${categoryId != null} ? @{/categories/{id}/edit(id=${categoryId})} : @{/categories/new}"
      th:object="${category}">

    <div class="mb-3">
        <label class="form-label">Tên danh mục</label>
        <input type="text" th:field="*{name}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Mô tả</label>
        <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
    </div>
    <button type="submit" class="btn btn-success">Lưu</button>
    <a class="btn btn-secondary" th:href="@{/categories}">Hủy</a>
</form>
</body>
</html>
