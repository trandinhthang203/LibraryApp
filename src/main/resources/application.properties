spring.application.name=LibraryManagement
# ===============================
# 1. CẤU HÌNH KẾT NỐI DATABASE
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5433/library_db
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# 2. CẤU HÌNH SPRING DATA JPA / HIBERNATE
# ===============================
# Hiển thị câu lệnh SQL trên console để dễ debug
spring.jpa.show-sql=true

# Format câu lệnh SQL cho dễ nhìn
spring.jpa.properties.hibernate.format_sql=true

# Chiến lược tự động tạo/cập nhật bảng (chỉ nên dùng update ở môi trường Dev)
# - create: Xóa bảng cũ và tạo lại từ đầu mỗi khi chạy app
# - update: Cập nhật cấu trúc bảng nếu Entity thay đổi (giữ nguyên dữ liệu)
# - none: Không làm gì cả (thường dùng trên Production)
spring.jpa.hibernate.ddl-auto=update

# Chỉ định Dialect để Hibernate biết cách sinh ra SQL chuẩn cho MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
