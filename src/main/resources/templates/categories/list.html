<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Quản lý danh mục</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Danh mục sách</h2>
    <a class="btn btn-success" th:href="@{/categories/new}">+ Thêm danh mục</a>
</div>

<div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

<table class="table table-bordered">
    <thead><tr><th>Tên</th><th>Mô tả</th><th style="width:180px;">Hành động</th></tr></thead>
    <tbody>
        <tr th:each="cat : ${categories}">
        <td>
            <a th:href="@{'/categories/' + ${cat.id}}" th:text="${cat.name}" class="text-decoration-none"></a>
        </td>
        <td th:text="${cat.description}"></td>
        <td>
            <a class="btn btn-sm btn-primary me-1" th:href="@{'/categories/' + ${cat.id}}">Xem</a>
            <a class="btn btn-sm btn-warning" th:href="@{'/categories/' + ${cat.id} + '/edit'}">Sửa</a>
            <form style="display:inline" method="post" th:action="@{'/categories/' + ${cat.id} + '/delete'}"
                  onsubmit="return confirm('Xóa danh mục này?');">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-sm btn-danger">Xóa</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<a class="btn btn-secondary" th:href="@{/home}">Quay lại</a>
</body>
</html>
