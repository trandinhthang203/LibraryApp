<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${category.name} + ' - Sách'"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 th:text="${category.name} + ' - Sách'"></h2>
        <a class="btn btn-secondary" th:href="@{/categories}">Quay lại danh mục</a>
    </div>

    <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <table class="table table-bordered align-middle">
        <thead>
        <tr>
            <th>Tiêu đề</th>
            <th>Tác giả</th>
            <th>Tồn kho</th>
            <th style="width: 200px;">Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${books.content}">
            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.stockQuantity}"></td>
            <td>
                <a class="btn btn-sm btn-outline-secondary" th:href="@{'/books/' + ${book.id}}">Chi tiết</a>
                <a sec:authorize="hasRole('ADMIN')" class="btn btn-sm btn-warning" th:href="@{'/books/' + ${book.id} + '/edit'}">Sửa</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${books.totalPages > 1}">
        <span th:each="i : ${#numbers.sequence(0, books.totalPages - 1)}" class="me-1">
            <a th:href="@{/categories/{id}(id=${category.id}, page=${i})}" th:text="${i + 1}"></a>
        </span>
    </div>

    <a class="btn btn-secondary mt-3" th:href="@{/home}">Quay lại trang chủ</a>
</body>
</html>
