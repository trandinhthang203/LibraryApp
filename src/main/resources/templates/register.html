<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 450px;">
    <div class="card shadow-sm p-4">
        <h3 class="text-center mb-3">Đăng ký tài khoản</h3>

        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

        <form method="post" th:action="@{/register}" th:object="${registerRequest}">
            <div class="mb-3">
                <label class="form-label">Họ và tên</label>
                <input type="text" th:field="*{fullName}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <input type="text" th:field="*{username}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <input type="password" th:field="*{password}" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Đăng ký</button>
        </form>

        <p class="text-center mt-3">
            Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a>
        </p>
    </div>
</div>
</body>
</html>
