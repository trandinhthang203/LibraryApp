<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ - LMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" th:href="@{/home}">📚 Thư viện Số</a>
    <div>
        <!-- Chưa đăng nhập -->
        <span sec:authorize="!isAuthenticated()">
            <a class="btn btn-outline-light btn-sm" th:href="@{/login}">Đăng nhập</a>
            <a class="btn btn-light btn-sm" th:href="@{/register}">Đăng ký</a>
        </span>
        <!-- Đã đăng nhập -->
        <span sec:authorize="isAuthenticated()">
            <span class="text-white me-2">
                Xin chào, <b sec:authentication="name"></b>
                (<span sec:authorize="hasRole('ADMIN')">Admin</span>
                 <span sec:authorize="hasRole('USER')">Người dùng</span>)
            </span>
            <a class="btn btn-outline-light btn-sm" th:href="@{/books}">Danh sách sách</a>
            <a class="btn btn-outline-light btn-sm" th:href="@{/categories}">Danh mục</a>
            <a class="btn btn-danger btn-sm" th:href="@{/logout}">Đăng xuất</a>
        </span>
    </div>
</nav>

<div class="container mt-5">
    <div class="p-5 mb-4 bg-white rounded-3 shadow-sm text-center">
        <h1>Chào mừng đến Thư viện Số</h1>
        <p class="fs-5">Hệ thống quản lý mượn/trả sách trực tuyến.</p>

        <div sec:authorize="!isAuthenticated()">
            <a class="btn btn-primary me-2" th:href="@{/login}">Đăng nhập ngay</a>
            <a class="btn btn-outline-primary" th:href="@{/register}">Tạo tài khoản mới</a>
        </div>

        <div sec:authorize="isAuthenticated()">
            <a class="btn btn-primary" th:href="@{/books}">Xem danh sách sách</a>
        </div>
    </div>
</div>
</body>
</html>
